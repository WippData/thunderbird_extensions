<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Teams Blocked</title>
    <link rel="stylesheet" href="blocked.css">
  </head>
  <body>
    <main class="blocked-shell">
      <section class="blocked-card">
        <span class="eyebrow">Owl Teams Blocker</span>
        <h1>Teams was blocked in Thunderbird</h1>
        <p class="lede">
          This add-on intercepted a Microsoft Teams load before it could stay open in Thunderbird.
        </p>
        <dl class="details">
          <div>
            <dt>Original URL</dt>
            <dd id="original-url">Unknown</dd>
          </div>
          <div>
            <dt>Trigger</dt>
            <dd id="source-value">Unknown</dd>
          </div>
          <div>
            <dt>Scope mode</dt>
            <dd id="mode-value">Unknown</dd>
          </div>
        </dl>
        <div id="fallback-note" class="fallback-note" hidden></div>
      </section>
    </main>
    <script src="blocked.js"></script>
  </body>
</html>
